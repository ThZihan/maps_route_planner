version: '3.8'

# Server-Specific Docker Compose Configuration
# IMPORTANT: This file maintains the SAME volume names as docker-compose.yml
# to prevent data loss when switching between configurations.
#
# Key Differences from docker-compose.yml:
# - Frontend port: 3001 (for Cloudflare routing)
# - All ports bound to 127.0.0.1 (security)
# - OSRM disabled (using public API to save memory)
# - No memory limits (let containers use what they need)

services:
  # OSRM Routing Engine (DISABLED - using public API to save ~768MB memory)
  # Uncomment to enable local OSRM when server has more RAM
  # osrm-backend:
  #   image: osrm/osrm-backend:latest
  #   container_name: osrm-backend
  #   ports:
  #     - "127.0.0.1:5000:5000"
  #   volumes:
  #     - ./data/osrm:/data
  #   command: >
  #     osrm-routed --algorithm mld /data/bangladesh-latest.osrm
  #   restart: unless-stopped
  #   networks:
  #     - maps-network

  # Nominatim Geocoding Service
  # IMPORTANT: Same volume names as docker-compose.yml to preserve data
  nominatim:
    image: mediagis/nominatim:4.2
    container_name: nominatim
    ports:
      - "127.0.0.1:8081:8080"  # External 8081, Internal 8080
    environment:
      - PBF_URL=https://download.geofabrik.de/asia/bangladesh-latest.osm.pbf
      - REPLICATION_URL=https://download.geofabrik.de/asia/bangladesh-updates
      - REPLICATION_UPDATE_INTERVAL=86400
      - REPLICATION_RECHECK_INTERVAL=86400
    volumes:
      - nominatim-data:/var/lib/postgresql/data
      - nominatim-project:/nominatim
    restart: unless-stopped
    networks:
      - maps-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/search?q=test"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 3600s

  # PostgreSQL (for future use)
  postgres:
    image: postgis/postgis:15-3.3-alpine
    container_name: postgres
    ports:
      - "127.0.0.1:5432:5432"  # Security: localhost only
    environment:
      - POSTGRES_DB=mapsdb
      - POSTGRES_USER=mapsuser
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - maps-network

  # Redis (for future use)
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"  # Security: localhost only
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - maps-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "127.0.0.1:3000:3000"  # Security: localhost only
    environment:
      - NODE_ENV=production
      - PORT=3000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      # Using public OSRM API (comment out if using local OSRM)
      - OSRM_URL=${OSRM_URL:-https://router.project-osrm.org}
      - NOMINATIM_URL=http://nominatim:8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mapsdb
      - DB_USER=mapsuser
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379
    depends_on:
      # osrm-backend:
      #   condition: service_started
      nominatim:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - maps-network

  # Frontend (served via nginx)
  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "127.0.0.1:3001:80"  # Port 3001 for Cloudflare routing
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - maps-network

# IMPORTANT: Same volume names as docker-compose.yml
# This ensures data is preserved when switching configurations
volumes:
  postgres-data:
  redis-data:
  nominatim-data:
  nominatim-project:

networks:
  maps-network:
    driver: bridge
